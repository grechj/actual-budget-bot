name: OCR import failure
description: Report screenshot OCR or OCR text parsing problems.
title: "[OCR]: "
labels: ["ocr", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing AB Bot. Please do not upload screenshots with real financial data.
        Redact names, balances, account numbers, transaction IDs, and any private details before sharing.
  - type: input
    id: source
    attributes:
      label: Screenshot source
      description: Example: iOS banking app, Android banking app, web banking screenshot, copied OCR text.
    validations:
      required: true
  - type: textarea
    id: raw-text
    attributes:
      label: Sanitized OCR text
      description: Paste the raw OCR text shown by AB Bot after removing private details.
      render: text
    validations:
      required: true
  - type: textarea
    id: parsed
    attributes:
      label: Actual parsed result
      description: Paste the transaction summary or warnings shown by AB Bot.
  - type: textarea
    id: expected
    attributes:
      label: Expected transactions
      description: List the sanitized transactions you expected AB Bot to find.
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: OCR engine/status
      options:
        - "Apple Vision"
        - "Tesseract"
        - "Not sure"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, AB Bot commit/version, browser, and whether the status panel showed OCR ready.
